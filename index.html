<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighter Ranking Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="animate-fade-in">
      <h1>Lighter Ranking Dashboard</h1>
      <p class="subtitle">ROI と取引量をリアルタイムでトラッキング</p>
    </header>

    <!-- 大会概要 -->
    <div id="competition-info" class="dashboard-card animate-fade-in" style="animation-delay: 0.1s;">
      <img src="assets/banner.png" alt="大会バナー" class="banner-thumb" onclick="document.getElementById('banner-modal').classList.add('active')">
    </div>

    <!-- バナー拡大表示 -->
    <div id="banner-modal" class="modal-overlay" onclick="this.classList.remove('active')">
      <img src="assets/banner.png" alt="大会バナー（拡大）" class="modal-image">
    </div>

    <div id="status" class="status animate-fade-in" style="animation-delay: 0.15s;">データを読み込んでいます...</div>

    <!-- ROI ランキング -->
    <div class="dashboard-card animate-fade-in" style="animation-delay: 0.2s;">
      <h2 class="section-title">ROI Ranking</h2>
      <div class="table-responsive">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Trader</th>
              <th>ROI</th>
              <th>PnL</th>
            </tr>
          </thead>
          <tbody id="roi-ranking-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Volume ランキング -->
    <div class="dashboard-card animate-fade-in" style="animation-delay: 0.3s;">
      <h2 class="section-title">Volume Ranking</h2>
      <p style="color: var(--text-secondary); margin: 0 0 12px 0;">Total Volume: <span id="vol-total" style="color: var(--text-primary); font-weight: 600;">—</span></p>
      <div class="table-responsive">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Trader</th>
              <th>Volume</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="vol-ranking-body"></tbody>
        </table>
      </div>
    </div>

    <footer class="animate-fade-in" style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin-top: 40px; animation-delay: 0.4s;">
      Powered by Lighter Explorer API
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
